[build]
  # Katalog z kodem źródłowym
  base = "WebClient_Happier"

  # Komenda do build'a
  command = "npm run build"

  # Katalog z zbudowaną aplikacją
  publish = "WebClient_Happier/dist"

[build.environment]
  # Zmienne środowiskowe dla build'a
  NODE_VERSION = "18"

# Przekierowania dla SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Nagłówki bezpieczeństwa
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache dla statycznych assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"